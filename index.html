  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/reveal.js/dist/reveal.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/reveal.js/dist/theme/black.css">
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@700;900&display=swap" rel="stylesheet">

  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      background: #f5a623;
    }

    .reveal, .slides, section {
      width: 100%;
      height: 100%;
    }

    section {
      margin: 0 !important;
      padding: 0 !important;
      display: flex !important;
      justify-content: center !important;
      align-items: center !important;
      background: linear-gradient(135deg, #f5a623 0%, #f8c471 50%, #f5a623 100%) !important;
      position: relative;
      overflow: hidden;
    }



    .slide-content {
      position: relative;
      z-index: 1;
      text-align: center;
      padding: 60px 80px;
      font-family: 'Nunito', Arial, sans-serif;
      color: #1a3a6b;
    }

    .slide-content h1 {
      font-size: 96px;
      font-weight: 900;
      line-height: 1.1;
      margin: 0;
      letter-spacing: 0.02em;
      color: #1a3a6b;
      text-transform: none;
    }

    .slide-content h2 {
      font-size: 72px;
      font-weight: 900;
      line-height: 1.15;
      margin: 0;
      color: #1a3a6b;
      text-transform: none;
    }

    .slide-content p {
      font-size: 52px;
      font-weight: 700;
      line-height: 1.4;
      margin: 20px 0 0;
      color: #1a3a6b;
    }

    .slide-content .small {
      font-size: 38px;
      font-weight: 700;
      color: rgba(26,58,107,0.7);
    }

    .lines-bg {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      pointer-events: none;
      z-index: 0;
    }

    iframe {
      width: 100%;
      height: 100%;
      border: none;
      position: relative;
      z-index: 1;
    }

    /* reveal.js pārrakstīšana */
    .reveal h1, .reveal h2, .reveal h3, .reveal p {
      font-family: 'Nunito', Arial, sans-serif;
      color: #1a3a6b;
      text-shadow: none;
    }
  </style>
</head>
